function updateGraph() {
    const threshold = parseFloat(document.getElementById("threshold").value);
    const topk = parseInt(document.getElementById("topk").value);

    const selected = Array.from(document.getElementById("hospitales").selectedOptions).map(o => o.value);

    let newEdges = [];

    let filtered = allEdges.filter(e => e.value >= threshold);

    if (selected.length > 0) {
        filtered = filtered.filter(e => selected.includes(e.from) && selected.includes(e.to));
    }

    let grouped = {};

    filtered.forEach(e => {
        if (!grouped[e.from]) grouped[e.from] = [];
        grouped[e.from].push(e);
    });

    for (let k in grouped) {
        grouped[k]
            .sort((a,b) => b.value - a.value)
            .slice(0, topk)
            .forEach(e => newEdges.push(e));
    }

    edges.clear();

    newEdges.forEach(e => {
        edges.add({
            from: e.from,
            to: e.to,
            value: e.value * 10,
            title: (e.value*100).toFixed(2) + "%"
        });
    });
}

window.addEventListener("load", () => {

    const select = document.getElementById("hospitales");

    allNodes.forEach(n => {
        const opt = document.createElement("option");
        opt.value = n;
        opt.text = n;
        select.appendChild(opt);
    });

    updateGraph();
});

    <br><br>

    <label>Top K</label><br>
    <input type="number" id="topk" value="3" min="1" max="10" onchange="updateGraph()">

    <br><br>

    <label>Hospitales</label><br>
    <select id="hospitales" multiple size="6" onchange="updateGraph()"></select>
</div>
